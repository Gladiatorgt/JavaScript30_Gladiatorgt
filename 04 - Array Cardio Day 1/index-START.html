      const vehicles = data.reduce((dataAsObject, current) => {
        // js here sees : since {} passed as initialValue => dataAsObject = {}, and current = car

          // key isnt present in the object

          dataAsObject[current] = 0;
        }
        // in further iterations if the dataAsObject[current] reappears
        dataAsObject[current]++; // increase its value

        return dataAsObject;
